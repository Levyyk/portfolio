<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Levik — IT-послуги для малого бізнесу</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Geologica:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:          #070710;
      --surface:     #0e0e1a;
      --surface-2:   #14141f;
      --border:      #252535;
      --accent:      #6c7cff;
      --accent-2:    #a78bfa;
      --text:        #eeeef5;
      --text-muted:  #7070a0;
      --text-dim:    #40405a;
      --green:       #34d399;
      --font-display:'Unbounded', sans-serif;
      --font-body:   'Geologica', sans-serif;
      --radius:      14px;
      --radius-lg:   22px;
      --t:           0.3s;
      --ease:        cubic-bezier(0.4, 0, 0.2, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    
    /* ІДЕАЛЬНЕ ЦЕНТРУВАННЯ: 25% висоти екрана + додаткові 60 пікселів */
    section { 
      scroll-margin-top: calc(25vh + 60px); 
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-weight: 300;
      line-height: 1.7;
      overflow-x: hidden;
    }
    
    a { text-decoration: none !important; color: inherit; }

    /* Grain texture */
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0;
    }

    .blob {
      position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 0;
      animation: blobFloat 12s ease-in-out infinite;
    }
    .blob-1 { width: 500px; height: 500px; top: -200px; right: -100px; background: radial-gradient(circle, rgba(108,124,255,0.12), transparent 70%); }
    .blob-2 { width: 400px; height: 400px; bottom: 20%; left: -150px; background: radial-gradient(circle, rgba(167,139,250,0.08), transparent 70%); animation-delay: -6s; }

    @keyframes blobFloat {
      0%, 100% { transform: scale(1) translate(0,0); }
      33%       { transform: scale(1.05) translate(20px, -30px); }
      66%       { transform: scale(0.97) translate(-15px, 20px); }
    }

    /* =============================================
       NAV
    ============================================= */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 0 5vw; height: 68px; display: flex;
      justify-content: space-between; align-items: center;
      background: rgba(7, 7, 16, 0.7); backdrop-filter: blur(24px);
      transition: all var(--t);
    }
    nav.scrolled { background: rgba(7, 7, 16, 0.9); border-bottom: 1px solid var(--border); }
    .nav-logo { font-family: var(--font-display); font-weight: 900; font-size: 1.1rem; }
    .nav-logo span { color: var(--accent); }

    .nav-right { display: flex; align-items: center; gap: 32px; }
    .nav-links { display: flex; gap: 28px; list-style: none; }
    .nav-links a { font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); transition: color var(--t); }
    .nav-links a:hover { color: #fff; }
    .nav-cta {
      padding: 9px 20px; border-radius: 100px;
      background: rgba(108,124,255,0.07); border: 1px solid rgba(108,124,255,0.25);
      font-size: 0.75rem; color: var(--accent); transition: all var(--t);
    }

    /* =============================================
       HERO
    ============================================= */
    #hero { min-height: 100vh; display: flex; align-items: center; padding: 100px 5vw; position: relative; }
    .hero-inner { max-width: 900px; position: relative; z-index: 1; }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 8px; padding: 7px 16px;
      border-radius: 100px; border: 1px solid var(--border); background: var(--surface);
      font-size: 0.7rem; color: var(--green); margin-bottom: 30px; text-transform: uppercase;
    }
    .hero-badge-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse-dot 2.5s infinite; }
    @keyframes pulse-dot { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.8); } }

    .hero-name { font-family: var(--font-display); font-weight: 900; font-size: clamp(2.5rem, 8vw, 6rem); line-height: 0.95; margin-bottom: 24px; }
    .hero-name .outline { color: transparent; -webkit-text-stroke: 1.5px var(--accent); }
    .hero-tagline { font-size: 1.1rem; color: var(--text-muted); max-width: 520px; margin-bottom: 40px; }
    .hero-cta { display: flex; gap: 14px; flex-wrap: wrap; }

    /* =============================================
       SECTIONS COMMON
    ============================================= */
    section { padding: 40px 5vw 100px; position: relative; z-index: 1; }
    .section-label { font-size: 0.65rem; text-transform: uppercase; color: var(--accent); letter-spacing: 0.16em; display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .section-label::before { content: ''; width: 24px; height: 1px; background: var(--accent); }
    .section-title { font-family: var(--font-display); font-weight: 700; font-size: clamp(1.6rem, 4vw, 2.8rem); line-height: 1.1; margin-bottom: 40px; }

    /* =============================================
       SERVICES
    ============================================= */
    .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(270px, 1fr)); gap: 18px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 32px; transition: all var(--t) var(--ease); position: relative; }
    .card:hover { border-color: #313148; background: var(--surface-2); transform: translateY(-5px); }
    .card-number { position: absolute; top: 24px; right: 24px; font-family: var(--font-display); font-size: 0.6rem; color: var(--text-dim); }
    .card-icon { width: 48px; height: 48px; background: rgba(108,124,255,0.07); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; margin-bottom: 16px; }
    .card-title { font-family: var(--font-display); font-size: 0.9rem; margin-bottom: 14px; }
    .card-desc { font-size: 0.84rem; color: var(--text-muted); margin-bottom: 20px; }
    .card-footer { display: flex; align-items: center; justify-content: space-between; border-top: 1px solid var(--border); padding-top: 16px; }
    .card-tag { padding: 4px 10px; border-radius: 100px; background: rgba(108,124,255,0.07); font-size: 0.65rem; color: var(--accent); }
    .card-arrow { color: var(--text-dim); font-size: 0.8rem; transition: all var(--t); }

    /* =============================================
       ABOUT
    ============================================= */
    .about-inner { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 60px; align-items: start; }
    .about-description p { font-size: 1.05rem; color: var(--text-muted); margin-bottom: 20px; line-height: 1.7; }
    
    .mission-panel { 
      display: flex; gap: 24px; background: var(--surface); border: 1px solid var(--border); 
      padding: 35px; border-radius: var(--radius); margin-top: 30px; margin-bottom: 50px; 
    }
    .mission-line { width: 4px; background: #3b4cff; border-radius: 10px; flex-shrink: 0; }
    .mission-title { font-family: var(--font-display); font-size: 0.75rem; color: var(--accent); text-transform: uppercase; font-weight: 700; margin-bottom: 16px; display: block; }
    .mission-main-text { font-size: 1.1rem; line-height: 1.7; font-weight: 300; }

    .about-stack { display: flex; flex-wrap: wrap; gap: 10px; }
    .stack-pill { padding: 6px 14px; border-radius: 100px; border: 1px solid var(--border); background: var(--surface); font-size: 0.75rem; color: var(--text-muted); transition: 0.3s; }

    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 35px; margin-bottom: 16px; transition: 0.3s; }
    .stat-number { font-family: var(--font-display); font-weight: 900; font-size: 2.6rem; background: linear-gradient(135deg, var(--accent), var(--accent-2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 5px; }
    .stat-label { font-size: 0.85rem; color: #fff; }

    /* =============================================
       CONTACT
    ============================================= */
    /* ЗАПАС ХОДУ: Великий відступ знизу, щоб форма могла піднятися до центру */
    #contact { padding-bottom: 60vh; } 

    .contact-grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 40px; }
    .contact-link { display: flex; align-items: center; gap: 16px; padding: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 12px; transition: 0.3s; }
    .contact-link-icon { width: 40px; height: 40px; background: rgba(108,124,255,0.07); display: flex; align-items: center; justify-content: center; border-radius: 10px; }
    .contact-link-value { color: #fff; font-size: 0.9rem; font-weight: 500; }

    .contact-form-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 35px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .form-field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .form-field label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; }
    .form-field input, .form-field textarea, .form-field select { background: var(--surface-2); border: 1px solid var(--border); padding: 14px; border-radius: var(--radius); color: #fff; font-family: inherit; transition: 0.3s; outline: none; }
    .form-field input:focus, .form-field select:focus { border-color: var(--accent); }
    .form-field textarea { min-height: 100px; resize: none; }

    /* FOOTER */
    footer { padding: 40px 5vw; background: var(--bg); border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; color: var(--text-dim); }

    /* REVEAL */
    .reveal { opacity: 0; transform: translateY(20px); transition: 0.8s var(--ease); }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    /* RESPONSIVE (2x2 Grid + Mobile Optimization) */
    @media (max-width: 1024px) {
      .about-inner, .contact-grid { grid-template-columns: 1fr; gap: 30px; }
    }
    
    @media (max-width: 768px) {
      .nav-links, .nav-cta { display: none; }
      
      /* Послуги 2х2 */
      .services-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
      .card { padding: 18px 12px; }
      .card-title { font-size: 0.75rem; }
      .card-desc { font-size: 0.65rem; -webkit-line-clamp: 3; display: -webkit-box; -webkit-box-orient: vertical; overflow: hidden; }
      
      .form-row { grid-template-columns: 1fr; }
      
      /* На мобілках скрол робимо трохи вище, щоб заголовок був ближче до верху */
      section { scroll-margin-top: 100px; }
    }
  </style>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <nav id="navbar">
    <!-- Повернення на самий верх (Hero) -->
    <a href="#hero" class="nav-logo">Lev<span>ik</span></a>
    <div class="nav-right">
      <ul class="nav-links">
        <li><a href="#services">Послуги</a></li>
        <li><a href="#about">Про мене</a></li>
        <li><a href="#contact">Контакт</a></li>
      </ul>
      <a href="#contact" class="nav-cta">Написати →</a>
    </div>
  </nav>

  <!-- HERO -->
  <section id="hero">
    <div class="hero-inner">
      <div class="hero-badge"><span class="hero-badge-dot"></span>Відкритий до замовлень</div>
      <h1 class="hero-name">Привіт,<br>я <span class="outline">Levik</span></h1>
      <p class="hero-tagline">IT-послуги для малого бізнесу —<br><strong>швидко, чесно і без зайвого.</strong></p>
      <div class="hero-cta">
        <a href="#contact" class="btn-primary">Обговорити проєкт <span>↓</span></a>
        <a href="#services" class="btn-ghost">Що я роблю <span>→</span></a>
      </div>
    </div>
  </section>

  <!-- SERVICES -->
  <section id="services">
    <div class="section-header">
      <p class="section-label reveal">Послуги</p>
      <h2 class="section-title reveal">Що я можу зробити<br>для тебе</h2>
    </div>
    <div class="services-grid">
      <div class="card reveal">
        <span class="card-number">01</span>
        <div class="card-icon">🐍</div>
        <div class="card-title">Python-скрипти</div>
        <p class="card-desc">Автоматизую рутинні задачі: обробка файлів,
